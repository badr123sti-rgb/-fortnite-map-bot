<!DOCTYPE html>
<html>
<body style="background:#111;color:white;font-family:sans-serif">

<h2>Login</h2>

<input id="u" placeholder="username">
<input id="p" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<h2>Broadcast</h2>

<input id="msg" placeholder="message">
<label><input type="checkbox" id="m">Mention</label>
<label><input type="checkbox" id="e">Embed</label>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="log"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let token;
const s = io();

async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u.value,password:p.value})
  });

  const data = await res.json();
  token = data.token;
  log("✅ logged in");
}

function start(){
  s.emit("start",{
    message:msg.value,
    mention:m.checked,
    embed:e.checked,
    user:u.value
  });
}

function stop(){
  s.emit("stop");
  log("⛔ stopped");
}

s.on("progress",d=>{
  log("Progress: "+d.percent+"%");
});

s.on("done",d=>{
  log("Done: "+d.sent);
});

s.on("log",t=>log(t));

function log(t){
  document.getElementById("log").innerHTML += "<p>"+t+"</p>";
}
</script>

</body>
</html>
